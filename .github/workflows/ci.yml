name: CI

on:
  push:
  pull_request:

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Build C impl and verify NSA test vector
        run: make test-c

      - name: Reproduce attack (smoke — 2 random keys)
        run: cd python && python run_multicube_100.py 2
